<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>和風脳トレ：色彩からくり</title>
    <style>
        /* 和風の世界観と、タッチ操作に最適化したスタイル */
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f4e8;
            font-family: "Yu Mincho", "Sawarabi Mincho", "Hiragino Mincho ProN", serif;
            color: #333;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            background: linear-gradient(135deg, #f5f4e8 0%, #e6e2c3 100%);
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        #status-bar {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: 2px solid #8c7042;
        }

        #timer-container {
            width: 100%;
            height: 10px;
            background-color: #ccc;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background-color: #b7282e;
            transition: width 0.05s linear;
        }

        #word-area {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
        }

        #target-word {
            font-size: 6rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            opacity: 0;
        }

        .drop-anim {
            animation: dropIn 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes dropIn {
            0% { transform: translateY(-100px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        #choices-area {
            position: absolute;
            bottom: 10%;
            width: 100%;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .color-btn {
            width: 16vw;
            height: 16vw;
            max-width: 80px;
            max-height: 80px;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            outline: none;
            transition: transform 0.1s;
        }

        .color-btn:active {
            transform: scale(0.95);
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(245, 244, 232, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #overlay h1 {
            font-size: 3rem;
            color: #8c7042;
            margin-bottom: 10px;
        }

        #overlay p {
            font-size: 1.3rem;
            text-align: center;
            padding: 0 20px;
            line-height: 1.5;
        }

        #difficulty-btns {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
            width: 80%;
            max-width: 300px;
        }

        .action-btn {
            padding: 15px 20px;
            font-size: 1.4rem;
            background-color: #2b4b65;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            font-family: inherit;
            transition: background-color 0.2s;
        }

        .action-btn:hover {
            background-color: #1e3548;
        }

        .hidden {
            display: none !important;
        }

        #hint {
            position: absolute;
            top: 20%;
            width: 100%;
            text-align: center;
            font-size: 1.2rem;
            color: #666;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status-bar">
        <div id="score-display">得点: 0 / 50</div>
        <div id="time-display">10.0秒</div>
    </div>
    <div id="timer-container"><div id="timer-bar"></div></div>
    
    <div id="hint">文字の「色」を選んでください</div>

    <div id="word-area">
        <div id="target-word">赤</div>
    </div>

    <div id="choices-area"></div>

    <div id="overlay">
        <h1 id="overlay-title">色彩からくり</h1>
        <p id="overlay-msg">文字が表す意味に惑わされず、<br>文字が塗られている<strong>「色」</strong>の丸を<br>素早くタッチしてください。</p>
        
        <div id="difficulty-btns">
            <button class="action-btn" onclick="startGame(3)">初級 (3択)</button>
            <button class="action-btn" onclick="startGame(4)">中級 (4択)</button>
            <button class="action-btn" onclick="startGame(5)">上級 (5択)</button>
        </div>
    </div>
</div>

<script>
    // -----------------------------------------
    // 1. Web Audio APIを使った電子音の生成
    // -----------------------------------------
    let audioCtx = null;

    // ユーザーが画面をタッチ（クリック）した瞬間にオーディオを初期化
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // 太鼓（難易度選択）：低めの「カッカッ」
    function playTaiko() {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        function hit(time) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, time);
            osc.frequency.exponentialRampToValueAtTime(100, time + 0.1);
            gain.gain.setValueAtTime(1, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(time);
            osc.stop(time + 0.1);
        }
        hit(t);       // 1回目
        hit(t + 0.15); // 2回目（0.15秒後）
    }

    // 拍子木（正解）：高くて短い「カチン！」
    function playHyoshigi() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    // 鈴（時間低下）：高い金属音の「チリン」
    function playSuzu() {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const freqs = [2500, 3000]; // 和音にして鈴っぽさを出す
        freqs.forEach(freq => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(t);
            osc.stop(t + 0.4);
        });
    }

    // 琴（クリア）：日本の伝統音階のアルペジオ「シャララン」
    function playKoto() {
        if (!audioCtx) return;
        const notes = [261.63, 293.66, 349.23, 392.00, 440.00, 523.25]; // ヨナ抜き音階風
        let t = audioCtx.currentTime;
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, t + i * 0.08);
            gain.gain.linearRampToValueAtTime(0.2, t + i * 0.08 + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(t + i * 0.08);
            osc.stop(t + i * 0.08 + 0.5);
        });
    }

    // お寺の鐘（時間切れ）：低く長く響く「ゴーン」
    function playKane() {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const freqs = [150, 300]; // 基音と倍音
        freqs.forEach(freq => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.5, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 3.0); // 3秒かけてゆっくり消える
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(t);
            osc.stop(t + 3.0);
        });
    }


    // -----------------------------------------
    // 2. ゲーム本体の処理
    // -----------------------------------------
    const colors = [
        { name: "赤", hex: "#D7003A" },
        { name: "青", hex: "#005CAF" },
        { name: "緑", hex: "#007B43" },
        { name: "黄", hex: "#FFD900" },
        { name: "紫", hex: "#884898" }
    ];

    let score = 0;
    let maxTime = 10;
    let timeLeft = 10;
    let timerId = null;
    let lastUpdate = 0;
    let currentCorrectHex = "";
    let currentChoicesCount = 3;
    let lastSecond = 0;

    const scoreDisplay = document.getElementById("score-display");
    const timeDisplay = document.getElementById("time-display");
    const timerBar = document.getElementById("timer-bar");
    const targetWord = document.getElementById("target-word");
    const choicesArea = document.getElementById("choices-area");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlay-title");
    const overlayMsg = document.getElementById("overlay-msg");

    function startGame(choicesCount) {
        // ボタンを押した瞬間にオーディオの制限を解除
        initAudio();

        currentChoicesCount = choicesCount;
        score = 0;
        overlay.classList.add("hidden");
        
        playTaiko(); // 難易度選択時に太鼓の音を鳴らす
        
        nextRound();
    }

    function getDifficultyMaxTime(currentScore) {
        const reduction = Math.floor(currentScore / 10) * 2;
        return Math.max(2, 10 - reduction);
    }

    function nextRound() {
        if (score >= 50) {
            gameClear();
            return;
        }

        maxTime = getDifficultyMaxTime(score);
        timeLeft = maxTime;
        lastSecond = Math.ceil(timeLeft);
        updateScoreUI();

        const textObj = colors[Math.floor(Math.random() * colors.length)];
        const colorObj = colors[Math.floor(Math.random() * colors.length)];
        
        currentCorrectHex = colorObj.hex;
        targetWord.textContent = textObj.name;
        targetWord.style.color = colorObj.hex;

        targetWord.classList.remove("drop-anim");
        void targetWord.offsetWidth; 
        targetWord.classList.add("drop-anim");

        generateChoices(colorObj);

        cancelAnimationFrame(timerId);
        lastUpdate = performance.now();
        timerId = requestAnimationFrame(updateTimer);
    }

    function generateChoices(correctColorObj) {
        choicesArea.innerHTML = ""; 

        let choices = [correctColorObj];
        let availableColors = colors.filter(c => c.hex !== correctColorObj.hex);
        
        availableColors.sort(() => Math.random() - 0.5);
        for(let i = 0; i < currentChoicesCount - 1; i++) {
            choices.push(availableColors[i]);
        }

        choices.sort(() => Math.random() - 0.5);

        choices.forEach(colorObj => {
            const btn = document.createElement("button");
            btn.className = "color-btn";
            btn.style.backgroundColor = colorObj.hex;
            btn.dataset.colorHex = colorObj.hex; 

            btn.addEventListener("pointerdown", (e) => {
                e.preventDefault();
                handleChoice(colorObj.hex);
            });

            choicesArea.appendChild(btn);
        });
    }

    function updateTimer(timestamp) {
        const delta = (timestamp - lastUpdate) / 1000;
        lastUpdate = timestamp;
        timeLeft -= delta;

        let currentSecond = Math.ceil(timeLeft);
        if (currentSecond < lastSecond) {
            if (currentSecond <= 3 && currentSecond > 0) {
                playSuzu(); // 残り3秒以下で鈴
            }
            lastSecond = currentSecond;
        }

        if (timeLeft <= 0) {
            timeLeft = 0;
            playKane(); // 時間切れでお寺の鐘
            gameOver("時間切れ！");
            return;
        }

        timeDisplay.textContent = timeLeft.toFixed(1) + "秒";
        timerBar.style.width = (timeLeft / maxTime * 100) + "%";
        
        if (timeLeft < 2) {
            timerBar.style.backgroundColor = "#FF0000";
        } else {
            timerBar.style.backgroundColor = "#b7282e";
        }

        timerId = requestAnimationFrame(updateTimer);
    }

    function handleChoice(selectedHex) {
        cancelAnimationFrame(timerId); 

        if (selectedHex === currentCorrectHex) {
            playHyoshigi(); // 正解で拍子木
            score++;
            nextRound(); 
        } else {
            gameOver("お手つき！"); 
        }
    }

    function updateScoreUI() {
        scoreDisplay.textContent = `得点: ${score} / 50`;
    }

    function gameOver(reason) {
        cancelAnimationFrame(timerId);
        overlayTitle.textContent = "無念";
        overlayTitle.style.color = "#b7282e";
        overlayMsg.innerHTML = `${reason}<br>記録: ${score}点<br><br>難易度を選んで再度挑戦を！`;
        overlay.classList.remove("hidden");
    }

    function gameClear() {
        cancelAnimationFrame(timerId);
        playKoto(); // クリアで琴
        overlayTitle.textContent = "あっぱれ！";
        overlayTitle.style.color = "#d9a62e";
        overlayMsg.innerHTML = `見事、50点達成です！<br>素晴らしい集中力と判断力ですね！`;
        overlay.classList.remove("hidden");
    }
</script>
</body>
</html>
